<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Shop | Simple, Secure, Mobile Shopping</title>
<meta name="description" content="Experience the best mobile shopping with E-Shop. Secure payments, fast delivery, and a wide range of products tailored for you.">
<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:title" content="E-Shop | Simple, Secure, Mobile Shopping">
<meta property="og:description" content="Experience the best mobile shopping with E-Shop. Secure payments, fast delivery, and a wide range of products.">
<meta property="og:image" content="https://images.pexels.com/photos/1152573/pexels-photo-1152573.jpeg">
<link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
<div class="top-bar">🚚 Fast & Secure Delivery • Free on orders over $50</div>
<div class="app-shell login-shell">
<header class="app-header">
<h1 class="app-title">E-Shop</h1>
</header>
<main class="app-main">
<section class="card form-card">
<div class="tabs">
<button id="tabSignIn" class="tab tab-active">Sign in</button>
<button id="tabSignUp" class="tab">Sign up</button>
</div>
<form id="signInForm" class="form" autocomplete="off" novalidate>
<input id="signInEmail" class="input" type="email" placeholder="Email" required autocomplete="off">
<input id="signInPassword" class="input" type="password" placeholder="Password" required autocomplete="off">
<div class="checkbox-group">
  <label><input id="rememberMe" type="checkbox"> Remember me for 2 weeks</label>
</div>
<button type="submit" class="button primary-button">Sign in</button>
</form>
<form id="signUpForm" class="form form-hidden" autocomplete="off" novalidate>
<input id="signUpEmail" class="input" type="email" placeholder="Email" required autocomplete="off">
<input id="signUpPassword" class="input" type="password" placeholder="Password (min 6 chars)" required autocomplete="off">
<button type="submit" class="button secondary-button">Create account</button>
</form>
</section>
</main>
</div>

<a href="https://wa.me/233532102856" target="_blank" id="floatingWA" class="floating-wa">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp Support">
</a>

<div id="toastContainer" class="toast-container"></div>
<script type="module" src="js/login.js"></script>
</body>
</html>
