<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">
<div class="app-shell login-shell">
<header class="app-header">
<h1 class="app-title">E-Shop</h1>
</header>
<main class="app-main">
<section class="card form-card">
<div class="tabs">
<button id="tabSignIn" class="tab tab-active">Sign in</button>
<button id="tabSignUp" class="tab">Sign up</button>
</div>
<form id="signInForm" class="form">
<input id="signInEmail" class="input" type="email" placeholder="Email" required>
<input id="signInPassword" class="input" type="password" placeholder="Password" required>
<button type="submit" class="button primary-button">Sign in</button>
</form>
<form id="signUpForm" class="form form-hidden">
<input id="signUpEmail" class="input" type="email" placeholder="Email" required>
<input id="signUpPassword" class="input" type="password" placeholder="Password (min 6 chars)" required>
<button type="submit" class="button secondary-button">Create account</button>
</form>
</section>
</main>
</div>
<div id="toastContainer" class="toast-container"></div>
<script type="module" src="js/login.js"></script>
</body>
</html>
